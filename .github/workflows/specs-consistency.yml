name: Specs Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate framework package
        run: node scripts/validate-framework-package.mjs

      - name: Run specs validation
        run: sed -i 's/\r$//' scripts/validate-specs.sh && bash scripts/validate-specs.sh

