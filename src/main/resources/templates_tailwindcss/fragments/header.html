<header th:fragment="header" class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
        <a href="/users" class="text-lg font-semibold text-slate-900">Reference App</a>
        <nav class="flex items-center gap-3">
            <a href="/users" class="text-sm font-medium text-slate-700 hover:text-slate-900">Users</a>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button class="rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-700" type="submit">
                    Logout
                </button>
            </form>
        </nav>
    </div>
</header>
