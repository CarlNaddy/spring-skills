<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/base :: layout('Login', ~{::section})}">
    <section class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
        <h1 class="text-2xl font-semibold">Sign In</h1>
        <p class="mt-1 text-sm text-slate-600">Use <span class="font-medium">admin</span> / <span class="font-medium">password</span>.</p>

        <div th:if="${param.error}" class="mt-4 rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="mt-4 rounded-md border border-green-200 bg-green-50 px-4 py-3 text-sm text-green-700">
            You have been logged out.
        </div>

        <form class="mt-5 space-y-4" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="space-y-1">
                <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                <input id="username" name="username" type="text" required
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-200">
            </div>
            <div class="space-y-1">
                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                <input id="password" name="password" type="password" required
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-200">
            </div>

            <div th:replace="~{components/button :: button('Login', 'primary', 'submit')}"></div>
        </form>
    </section>
</html>
