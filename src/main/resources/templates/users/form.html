<section th:fragment="userForm" class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
    <h2 class="text-lg font-semibold text-slate-900">Create User</h2>
    <p class="mt-1 text-sm text-slate-600">Add a user with basic profile information.</p>

    <form class="mt-4 space-y-4"
          th:action="@{/users}"
          th:object="${userForm}"
          method="post"
          hx-post="/users"
          hx-target="#users-panel"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful){ this.reset() }">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div th:replace="~{components/input :: input('name', 'Name', 'text', 'e.g. Ada Lovelace', ${#fields.hasErrors('name')}, ${#fields.hasErrors('name') ? #fields.errors('name')[0] : ''})}"></div>
        <div th:replace="~{components/input :: input('email', 'Email', 'email', 'e.g. ada@example.com', ${#fields.hasErrors('email')}, ${#fields.hasErrors('email') ? #fields.errors('email')[0] : ''})}"></div>

        <div th:replace="~{components/button :: button('Create User', 'primary', 'submit')}"></div>
    </form>
</section>
