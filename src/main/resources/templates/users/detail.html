<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/base :: layout('User Detail', ~{::section})}">
    <section class="space-y-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">User Detail</h1>
                <p class="mt-1 text-sm text-slate-600">All available information for this user.</p>
            </div>
            <a href="/users"
               class="rounded-md bg-white px-3 py-2 text-sm font-medium text-slate-700 ring-1 ring-slate-300 hover:bg-slate-100">
                Back to Users
            </a>
        </div>

        <div class="overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm">
            <dl class="divide-y divide-slate-200">
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3">
                    <dt class="text-sm font-medium text-slate-600">ID</dt>
                    <dd class="text-sm text-slate-900 sm:col-span-2" th:text="${user.id()}">1</dd>
                </div>
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3">
                    <dt class="text-sm font-medium text-slate-600">Name</dt>
                    <dd class="text-sm text-slate-900 sm:col-span-2" th:text="${user.name()}">Jane Doe</dd>
                </div>
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3">
                    <dt class="text-sm font-medium text-slate-600">Email</dt>
                    <dd class="text-sm text-slate-900 sm:col-span-2" th:text="${user.email()}">jane@example.com</dd>
                </div>
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3">
                    <dt class="text-sm font-medium text-slate-600">Address</dt>
                    <dd class="text-sm text-slate-900 sm:col-span-2" th:text="${user.address() != null ? user.address() : 'Not provided'}">Not provided</dd>
                </div>
                <div class="grid grid-cols-1 gap-2 px-4 py-3 sm:grid-cols-3">
                    <dt class="text-sm font-medium text-slate-600">Phone Number</dt>
                    <dd class="text-sm text-slate-900 sm:col-span-2" th:text="${user.phoneNumber() != null ? user.phoneNumber() : 'Not provided'}">Not provided</dd>
                </div>
            </dl>
        </div>

        <section th:fragment="todoSection" id="todo-section" class="space-y-4 rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-lg font-semibold text-slate-900">Todo List</h2>
                    <p class="mt-1 text-sm text-slate-600">Tasks for this user.</p>
                </div>
                <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700" th:text="${#lists.size(todos)} + ' total'">0 total</span>
            </div>

            <div th:if="${todoError != null}" class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700" th:text="${todoError}">
                Todo text is required.
            </div>
            <div th:if="${successMessage != null}" class="rounded-md border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-700" th:text="${successMessage}">
                Todo updated.
            </div>

            <form th:action="@{/users/{id}/todos(id=${user.id()})}"
                  method="post"
                  th:hx-post="@{/users/{id}/todos(id=${user.id()})}"
                  hx-target="#todo-section"
                  hx-swap="outerHTML"
                  class="flex gap-2">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="text"
                       name="text"
                       placeholder="Add a todo item"
                       class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 shadow-sm focus:border-slate-500 focus:outline-none focus:ring-2 focus:ring-slate-200">
                <button type="submit"
                        class="shrink-0 rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">
                    Add
                </button>
            </form>

            <ul class="divide-y divide-slate-200 rounded-md border border-slate-200">
                <li th:if="${#lists.isEmpty(todos)}" class="px-3 py-3 text-sm text-slate-500">
                    No todos yet.
                </li>
                <li th:each="todo : ${todos}" class="flex items-center justify-between gap-3 px-3 py-2 text-sm text-slate-800">
                    <div class="flex items-center gap-2">
                        <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium"
                              th:classappend="${todo.done()} ? ' bg-green-100 text-green-700' : ' bg-slate-100 text-slate-700'"
                              th:text="${todo.done()} ? 'Done' : 'Open'">Open</span>
                        <span th:text="${todo.text()}"
                              th:classappend="${todo.done()} ? ' line-through text-slate-500' : ''">Follow up with user</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <form th:if="${!todo.done()}"
                              th:action="@{/users/{id}/todos/{todoId}/done(id=${user.id()},todoId=${todo.id()})}"
                              method="post"
                              th:hx-post="@{/users/{id}/todos/{todoId}/done(id=${user.id()},todoId=${todo.id()})}"
                              hx-target="#todo-section"
                              hx-swap="outerHTML"
                              class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                    class="rounded-md bg-green-50 px-3 py-1.5 text-xs font-medium text-green-700 ring-1 ring-green-200 hover:bg-green-100">
                                Mark Done
                            </button>
                        </form>
                        <form th:action="@{/users/{id}/todos/{todoId}/delete(id=${user.id()},todoId=${todo.id()})}"
                              method="post"
                              th:hx-post="@{/users/{id}/todos/{todoId}/delete(id=${user.id()},todoId=${todo.id()})}"
                              hx-target="#todo-section"
                              hx-swap="outerHTML"
                              class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                    class="rounded-md bg-red-50 px-3 py-1.5 text-xs font-medium text-red-700 ring-1 ring-red-200 hover:bg-red-100">
                                Delete
                            </button>
                        </form>
                    </div>
                </li>
            </ul>
        </section>
    </section>
</html>
