<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/base :: layout('User Detail', ~{::section})}">
    <section class="d-grid gap-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 mb-1">User Detail</h1>
                <p class="text-secondary mb-0">All available information for this user.</p>
            </div>
            <a href="/users"
               class="btn btn-outline-secondary btn-sm">
                Back to Users
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-3 text-secondary">ID</dt>
                    <dd class="col-sm-9" th:text="${user.id()}">1</dd>
                    <dt class="col-sm-3 text-secondary">Name</dt>
                    <dd class="col-sm-9" th:text="${user.name()}">Jane Doe</dd>
                    <dt class="col-sm-3 text-secondary">Email</dt>
                    <dd class="col-sm-9" th:text="${user.email()}">jane@example.com</dd>
                    <dt class="col-sm-3 text-secondary">Address</dt>
                    <dd class="col-sm-9" th:text="${user.address() != null ? user.address() : 'Not provided'}">Not provided</dd>
                    <dt class="col-sm-3 text-secondary">Phone Number</dt>
                    <dd class="col-sm-9" th:text="${user.phoneNumber() != null ? user.phoneNumber() : 'Not provided'}">Not provided</dd>
                </dl>
            </div>
        </div>

        <section th:fragment="todoSection" id="todo-section" class="card shadow-sm">
            <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="h5 mb-1">Todo List</h2>
                    <p class="text-secondary mb-0">Tasks for this user.</p>
                </div>
                <span class="badge text-bg-secondary" th:text="${#lists.size(todos)} + ' total'">0 total</span>
            </div>

            <div th:if="${todoError != null}" class="alert alert-danger mt-3 mb-0" th:text="${todoError}">
                Todo text is required.
            </div>
            <div th:if="${successMessage != null}" class="alert alert-success mt-3 mb-0" th:text="${successMessage}">
                Todo updated.
            </div>

            <form th:action="@{/users/{id}/todos(id=${user.id()})}"
                  method="post"
                  th:hx-post="@{/users/{id}/todos(id=${user.id()})}"
                  hx-target="#todo-section"
                  hx-swap="outerHTML"
                  class="input-group mt-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="text"
                       name="text"
                       placeholder="Add a todo item"
                       class="form-control">
                <button type="submit"
                        class="btn btn-primary">
                    Add
                </button>
            </form>

            <ul class="list-group mt-3">
                <li th:if="${#lists.isEmpty(todos)}" class="list-group-item text-secondary">
                    No todos yet.
                </li>
                <li th:each="todo : ${todos}" class="list-group-item d-flex justify-content-between align-items-center gap-2">
                    <div class="d-flex align-items-center gap-2">
                        <span class="badge"
                              th:classappend="${todo.done()} ? ' text-bg-success' : ' text-bg-secondary'"
                              th:text="${todo.done()} ? 'Done' : 'Open'">Open</span>
                        <span th:text="${todo.text()}"
                              th:classappend="${todo.done()} ? ' text-decoration-line-through text-secondary' : ''">Follow up with user</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <form th:if="${!todo.done()}"
                              th:action="@{/users/{id}/todos/{todoId}/done(id=${user.id()},todoId=${todo.id()})}"
                              method="post"
                              th:hx-post="@{/users/{id}/todos/{todoId}/done(id=${user.id()},todoId=${todo.id()})}"
                              hx-target="#todo-section"
                              hx-swap="outerHTML"
                              class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                    class="btn btn-outline-success btn-sm">
                                Mark Done
                            </button>
                        </form>
                        <form th:action="@{/users/{id}/todos/{todoId}/delete(id=${user.id()},todoId=${todo.id()})}"
                              method="post"
                              th:hx-post="@{/users/{id}/todos/{todoId}/delete(id=${user.id()},todoId=${todo.id()})}"
                              hx-target="#todo-section"
                              hx-swap="outerHTML"
                              class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit"
                                    class="btn btn-outline-danger btn-sm">
                                Delete
                            </button>
                        </form>
                    </div>
                </li>
            </ul>
            </div>
        </section>
    </section>
</html>
