<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/base :: layout('Users', ~{::section})}">
    <section th:fragment="userSection" id="users-panel" class="d-grid gap-4">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Users</h1>
            <button class="btn btn-outline-secondary btn-sm"
                    hx-get="/users/list"
                    hx-target="#user-list-container"
                    hx-swap="outerHTML">
                Refresh List
            </button>
        </div>

        <div th:if="${successMessage}" class="alert alert-success mb-0"
             th:text="${successMessage}">
            User created successfully.
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-6" th:replace="~{users/form :: userForm}"></div>
            <div class="col-12 col-lg-6" th:replace="~{users/list :: userListContainer}"></div>
        </div>
    </section>
</html>
