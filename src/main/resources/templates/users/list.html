<section th:fragment="userListContainer" id="user-list-container" class="card shadow-sm">
    <div class="card-body">
    <div class="d-flex justify-content-between align-items-center">
        <h2 class="h5 mb-0">User List</h2>
        <span class="badge text-bg-secondary" th:text="${#lists.size(users)} + ' total'">0 total</span>
    </div>

    <div th:fragment="userList" class="table-responsive mt-3">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Name</th>
                <th scope="col">Email</th>
                <th scope="col" class="d-none d-md-table-cell">Address</th>
                <th scope="col" class="d-none d-lg-table-cell">Phone</th>
                <th scope="col" class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(users)}">
                <td class="text-secondary" colspan="6">No users yet.</td>
            </tr>
            <tr th:each="user : ${users}">
                <td>
                    <a th:href="@{/users/{id}(id=${user.id()})}"
                       class="link-body-emphasis text-decoration-none"
                       th:text="${user.id()}">1</a>
                </td>
                <td>
                    <a th:href="@{/users/{id}(id=${user.id()})}"
                       class="fw-semibold link-body-emphasis text-decoration-none"
                       th:text="${user.name()}">Jane Doe</a>
                </td>
                <td>
                    <a th:href="@{/users/{id}(id=${user.id()})}"
                       class="link-body-emphasis text-decoration-none"
                       th:text="${user.email()}">jane@example.com</a>
                </td>
                <td class="d-none d-md-table-cell" th:text="${user.address() != null ? user.address() : '-'}">-</td>
                <td class="d-none d-lg-table-cell" th:text="${user.phoneNumber() != null ? user.phoneNumber() : '-'}">-</td>
                <td class="text-end">
                    <form th:action="@{/users/{id}/delete(id=${user.id()})}"
                          method="post"
                          th:hx-post="@{/users/{id}/delete(id=${user.id()})}"
                          hx-target="#users-panel"
                          hx-swap="outerHTML"
                          th:attr="hx-confirm=|Delete user '${user.name()}'?|"
                          class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit"
                                class="btn btn-outline-danger btn-sm">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    </div>
</section>
