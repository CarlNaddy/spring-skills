<section th:fragment="userListContainer" id="user-list-container" class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
    <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900">User List</h2>
        <span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700" th:text="${#lists.size(users)} + ' total'">0 total</span>
    </div>

    <div th:fragment="userList" class="mt-4 overflow-hidden rounded-md border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-600">
            <tr>
                <th class="px-3 py-2">ID</th>
                <th class="px-3 py-2">Name</th>
                <th class="px-3 py-2">Email</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 bg-white text-sm text-slate-800">
            <tr th:if="${#lists.isEmpty(users)}">
                <td class="px-3 py-4 text-slate-500" colspan="3">No users yet.</td>
            </tr>
            <tr th:each="user : ${users}">
                <td class="px-3 py-2" th:text="${user.id()}">1</td>
                <td class="px-3 py-2" th:text="${user.name()}">Jane Doe</td>
                <td class="px-3 py-2" th:text="${user.email()}">jane@example.com</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
