<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Reference App</title>
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <script defer th:src="@{/vendor/htmx/htmx.min.js}"></script>
    <script defer th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary text-body" data-bs-theme="dark">
<div th:replace="~{fragments/header :: header}"></div>

<main class="container py-4 flex-grow-1">
    <th:block th:replace="${content}"></th:block>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
