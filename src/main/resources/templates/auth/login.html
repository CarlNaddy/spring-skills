<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layouts/base :: layout('Login', ~{::section})}">
    <section class="mx-auto col-12 col-md-8 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h3 mb-1">Sign In</h1>
                <p class="text-secondary mb-3">Use <span class="fw-semibold">admin</span> / <span class="fw-semibold">password</span>.</p>

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input id="username" name="username" type="text" required class="form-control">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input id="password" name="password" type="password" required class="form-control">
                    </div>

                    <div th:replace="~{components/button :: button('Login', 'primary', 'submit')}"></div>
                </form>
            </div>
        </div>
    </section>
</html>
